name: Build and Release

on:
  workflow_call:
    inputs:
      build-deps:
        description: "Space-separated list of build dependencies to install on Linux"
        required: false
        type: string
        default: ""
      build-deps-arm64:
        description: "Space-separated list of additional arm64 build dependencies"
        required: false
        type: string
        default: ""
      targets:
        description: "JSON array of targets to build"
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","arch":"amd64","linker":"gcc"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-latest","arch":"arm64","linker":"aarch64-linux-gnu-gcc"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","arch":"amd64","linker":""}]'
      run-tests:
        description: "Run tests on amd64 Linux"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.targets) }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      env:
        BUILD_DEPS: ${{ inputs.build-deps }}
        BUILD_DEPS_ARM64: ${{ inputs.build-deps-arm64 }}
        ARCH: ${{ matrix.arch }}
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config ${BUILD_DEPS}
        if [ "${ARCH}" = "arm64" ]; then
          sudo dpkg --add-architecture arm64
          sudo rm -f /etc/apt/sources.list.d/*.list /etc/apt/sources.list.d/*.sources
          CODENAME=$(lsb_release -cs)
          sudo tee /etc/apt/sources.list << EOF
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME} main restricted universe multiverse
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-updates main restricted universe multiverse
        deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-security main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME} main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-security main restricted universe multiverse
        EOF
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu ${BUILD_DEPS_ARM64}
        fi

    - name: Build release binary
      env:
        TARGET: ${{ matrix.target }}
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        PKG_CONFIG_SYSROOT_DIR: ${{ matrix.arch == 'arm64' && '/usr/aarch64-linux-gnu' || '' }}
        PKG_CONFIG_PATH: ${{ matrix.arch == 'arm64' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
      run: cargo build --release --target "${TARGET}" --verbose

    - name: Run tests
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64' && inputs.run-tests
      run: cargo test --verbose

    - name: Upload artifacts (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/*
        retention-days: 30

    - name: Upload artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/*.exe
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: binaries-*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
