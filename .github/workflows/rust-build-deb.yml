name: Build Debian Package

on:
  workflow_call:
    inputs:
      build-deps:
        description: "Space-separated list of build dependencies to install (e.g. 'libdbus-1-dev')"
        required: false
        type: string
        default: ""
      targets:
        description: "JSON array of targets to build"
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","arch":"amd64"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-22.04-arm","arch":"arm64"}]'
      run-tests:
        description: "Run tests on amd64"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-deb:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.targets) }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

    - name: Install build dependencies
      env:
        BUILD_DEPS: ${{ inputs.build-deps }}
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config ${BUILD_DEPS}

    - name: Install cargo-deb
      run: cargo install cargo-deb

    - name: Build release binary
      env:
        TARGET: ${{ matrix.target }}
      run: cargo build --release --target "${TARGET}" --verbose

    - name: Run tests
      if: matrix.arch == 'amd64' && inputs.run-tests
      run: cargo test --verbose

    - name: Build Debian package
      env:
        TARGET: ${{ matrix.target }}
      run: cargo deb --no-build --target "${TARGET}"

    - name: Get package filename
      id: package
      env:
        TARGET: ${{ matrix.target }}
      run: |
        PACKAGE=$(ls target/${TARGET}/debian/*.deb | head -n 1)
        echo "path=$PACKAGE" >> $GITHUB_OUTPUT
        echo "name=$(basename $PACKAGE)" >> $GITHUB_OUTPUT

    - name: Upload Debian package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: debian-package-${{ matrix.arch }}
        path: ${{ steps.package.outputs.path }}
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: debian-package-*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*.deb
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
