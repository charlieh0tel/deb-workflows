name: Build and Release

on:
  workflow_call:
    inputs:
      build-deps:
        description: "Space-separated list of build dependencies to install on Linux"
        required: false
        type: string
        default: ""
      targets:
        description: "JSON array of targets to build"
        required: false
        type: string
        default: '[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest","arch":"amd64"},{"target":"aarch64-unknown-linux-gnu","os":"ubuntu-22.04-arm","arch":"arm64"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest","arch":"amd64"}]'
      run-tests:
        description: "Run tests on amd64 Linux"
        required: false
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(inputs.targets) }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

    - name: Install build dependencies (Linux)
      if: runner.os == 'Linux'
      env:
        BUILD_DEPS: ${{ inputs.build-deps }}
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config ${BUILD_DEPS}

    - name: Build release binary
      env:
        TARGET: ${{ matrix.target }}
      run: cargo build --release --target "${TARGET}" --verbose

    - name: Run tests
      if: matrix.os == 'ubuntu-latest' && matrix.arch == 'amd64' && inputs.run-tests
      run: cargo test --verbose

    - name: Upload artifacts (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/*
        retention-days: 30

    - name: Upload artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/*.exe
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: binaries-*

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
