name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      requirements-file:
        description: "Path to requirements.txt (empty to skip install)"
        required: false
        type: string
        default: "requirements.txt"
      test-command:
        description: "Command to run tests (empty to skip)"
        required: false
        type: string
        default: "pytest --showlocals -rA"
      lint-command:
        description: "Command to run linter (empty to skip)"
        required: false
        type: string
        default: "ruff check ."
      format-check-command:
        description: "Command to check formatting (empty to skip)"
        required: false
        type: string
        default: "ruff format --check ."

jobs:
  lint:
    if: inputs.lint-command != ''
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - run: pip install ruff
    - env:
        LINT_CMD: ${{ inputs.lint-command }}
      run: $LINT_CMD

  format:
    if: inputs.format-check-command != ''
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - run: pip install ruff
    - env:
        FMT_CMD: ${{ inputs.format-check-command }}
      run: $FMT_CMD

  test:
    if: inputs.test-command != ''
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install dependencies
      env:
        REQS: ${{ inputs.requirements-file }}
      run: |
        pip install pytest ruff
        if [ -n "${REQS}" ] && [ -f "${REQS}" ]; then
          pip install -r "${REQS}"
        fi
    - env:
        TEST_CMD: ${{ inputs.test-command }}
      run: $TEST_CMD
